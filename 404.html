<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>The Victoria Falls Hotel</title>
    <script>
      // SPA refresh shim — stash the deep route, then redirect to index.
      // main.jsx rehydrates the route via history.replaceState before render.
      (function () {
        try {
          var path = window.location.pathname + window.location.search + window.location.hash;
          sessionStorage.setItem('vfh:spa-redirect', path);
        } catch (_) {}
        window.location.replace('/');
      })();
    </script>
  </head>
  <body>
    <noscript>
      Please enable JavaScript to access The Victoria Falls Hotel — established 1904.
    </noscript>
  </body>
</html>
